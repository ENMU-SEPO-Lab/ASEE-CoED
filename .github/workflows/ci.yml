name: Java AutoGrader CI (Maven Optimized)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11 & Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven' # This is the magic line that saves resources

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 1. Compile, Test, PMD, and Checkstyle in ONE command
      # -B: Batch mode (less logging)
      # -Dno-transfer-progress: Hide download progress bars to save log space
      - name: Build and Run Quality Checks
        run: mvn -B clean verify pmd:pmd checkstyle:checkstyle -Dno-transfer-progress

      # 2. Run your custom grading script
      - name: Run grading script
        run: |
          if [ -f grade.py ]; then
            python grade.py
          fi

      # 3. Upload Reports (Maven puts them in the 'target' folder)
      - name: Upload grading feedback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grading-reports
          path: target/*.xml
          retention-days: 5

      # 4. Email Feedback
      - name: Send Feedback Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python <<'EOF'
          import os, re, smtplib
          from email.message import EmailMessage
          from pathlib import Path

          # Find student email from @author tag
          student_email = "essa.imhmed@enmu.edu" # Default
          for java_file in Path('.').rglob('*.java'):
              with open(java_file, 'r') as f:
                  match = re.search(r'@author\s+([^\s]+)', f.read())
                  if match:
                      student_email = f"{match.group(1)}@enmu.edu"
                      break

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = student_email
          msg.set_content("Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed")

          feedback = Path("target/feedback.md") # Assuming grade.py outputs here
          if feedback.exists():
              with open(feedback,'rb') as f:
                  msg.add_attachment(f.read(), maintype='text', subtype='plain', filename='feedback.md')

          with smtplib.SMTP('smtp.gmail.com', 587) as server:
              server.starttls()
              server.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              server.send_message(msg)
          EOF