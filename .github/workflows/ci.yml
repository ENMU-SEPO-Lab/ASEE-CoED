name: Java AutoGrader CI (Maven Optimized)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11 & Maven Cache
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Run Maven - we force it to continue even if tests fail/timeout
      - name: Build and Run Quality Checks
        run: mvn -B clean verify pmd:pmd checkstyle:checkstyle -Dno-transfer-progress -Dmaven.test.failure.ignore=true

      # Run your grading script (this consumes the Maven XML reports)
      - name: Run grading script
        if: always()
        run: |
          if [ -f grade.py ]; then
            python grade.py
          fi

      # Upload Reports
      - name: Upload grading feedback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grading-reports
          path: target/
          retention-days: 5

      # Email Feedback to Student
      - name: Send Feedback Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python <<'EOF'
          import os, re, smtplib
          from email.message import EmailMessage
          from pathlib import Path

          student_email = "essa.imhmed@enmu.edu" # Fallback
          for java_file in Path('upload_here').rglob('*.java'):
              with open(java_file, 'r') as f:
                  match = re.search(r'@author\s+([^\s]+)', f.read())
                  if match:
                      student_email = f"{match.group(1)}@enmu.edu"
                      break

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = student_email
          msg.set_content("Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed")

          # Attach feedback (Assuming grade.py creates target/feedback.md)
          feedback = Path("target/feedback.md") 
          if not feedback.exists(): # Check fallback location if target/ isn't used
              feedback = Path("reports/feedback.md")

          if feedback.exists():
              with open(feedback,'rb') as f:
                  msg.add_attachment(f.read(), maintype='text', subtype='plain', filename='feedback.md')

          try:
              with smtplib.SMTP('smtp.gmail.com', 587) as server:
                  server.starttls()
                  server.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
                  server.send_message(msg)
              print(f"Email successfully sent to {student_email}")
          except Exception as e:
              print(f"Failed to send email: {e}")
          EOF
