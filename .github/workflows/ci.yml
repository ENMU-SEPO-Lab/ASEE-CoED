name: Java AutoGrader CI (Gradle Optimized)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Automatically handles caching of Gradle and dependencies
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Fixes permissions for the runner
      - name: Grant execute permission
        run: chmod +x gradlew

      # Build and Test (using --no-daemon to save runner memory)
      - name: Build and Check
        run: ./gradlew build pmdMain checkstyleMain --no-daemon

      - name: Run grading script
        if: always()
        run: |
          if [ -f grade.py ]; then
            python grade.py
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grading-reports
          path: build/reports/
          retention-days: 5 # Saves your GitHub storage quota

      - name: Send Feedback Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python <<'EOF'
          import os, re, smtplib
          from email.message import EmailMessage
          from pathlib import Path

          # Find student email from @author tag
          student_email = "essa.imhmed@enmu.edu"
          for java_file in Path('upload_here').rglob('*.java'):
              with open(java_file, 'r') as f:
                  match = re.search(r'@author\s+([^\s]+)', f.read())
                  if match:
                      student_email = f"{match.group(1)}@enmu.edu"
                      break

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = student_email
          msg.set_content("Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed")

          # Attach feedback (Looks in Gradle's build folder first)
          feedback = Path("build/reports/feedback.md")
          if not feedback.exists():
              feedback = Path("reports/feedback.md")

          if feedback.exists():
              with open(feedback,'rb') as f:
                  msg.add_attachment(f.read(), maintype='text', subtype='plain', filename='feedback.md')

          try:
              with smtplib.SMTP('smtp.gmail.com', 587) as server:
                  server.starttls()
                  server.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
                  server.send_message(msg)
              print(f"Email successfully sent to {student_email}")
          except Exception as e:
              print(f"Email failed: {e}")
          EOF
