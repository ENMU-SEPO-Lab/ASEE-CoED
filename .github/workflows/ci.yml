name: Java AutoGrader CI

# Trigger only when push affects 'upload_here/' or manually
on:
  push:
    paths:
      - 'upload_here/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_V: '3.11'
      VENV_PATH: '.venv'
      BUILD_DIR: 'build'
      TEMP_JSON: 'build/temp_info.json'
      REPORT_DIR: 'reports'
      CODE_CLASSES_DIR: 'build/classes/student'
      TEST_CLASSES_DIR: 'build/classes/tests'
      TEST_REPORT_DIR: 'reports/test_reports'
      GRADE_REPORT_DIR: 'reports/grade_reports'
      ASSIGNMENT_DIR: 'upload_here'
      UNIT_TEST_DIR: 'test'

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java 11
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Setup Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_V }}

      # Install minimal utilities
      - name: Install wget & unzip
        run: sudo apt-get update && sudo apt-get install -y wget unzip

      # Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p lib $CODE_CLASSES_DIR $TEST_CLASSES_DIR $TEST_REPORT_DIR $GRADE_REPORT_DIR 
          
      # Cache all grading tools and compiled classes
      - name: Cache grading tools and compiled classes
        uses: actions/cache@v3
        with:
          path: |
            lib
            junit-console.jar
            pmd
            checkstyle.jar
          key: ${{ runner.os }}-grading-tools-v7

      # ${ env.BUILD_DIR }} removed BUILD_DIR from cache. Because in real environment, each submission will be different from the previous.
      # Caching the build dir might lead to weird .class file artifacts influencing grading?

      # Download JUnit & Hamcrest if missing
      - name: Download JUnit & Hamcrest
        run: |
          [ -f lib/junit-4.13.2.jar ] || wget -O lib/junit-4.13.2.jar https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar
          [ -f lib/hamcrest-core-1.3.jar ] || wget -O lib/hamcrest-core-1.3.jar https://search.maven.org/remotecontent?filepath=org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

      # Download JUnit Console Runner if missing
      - name: Download JUnit Console
        run: |
          [ -f junit-console.jar ] || wget -O junit-console.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar
      
      # Download PMD if missing
      - name: Download PMD
        run: |
          [ -f pmd/bin/pmd ] || ( \
           wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip && \
           unzip pmd-dist-7.0.0-bin.zip && \
           mv pmd-bin-7.0.0 pmd \
          )

      # Download Checkstyle if missing
      - name: Download Checkstyle
        run: |
          [ -f checkstyle.jar ] || wget -O checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

      # Compile student code (cached build will skip unchanged)
      - name: Compile Student Code
        run: |
          find $ASSIGNMENT_DIR -name "*.java" | xargs javac -d $CODE_CLASSES_DIR

      # Compile tests
      - name: Compile Tests
        run: |
          find $UNIT_TEST_DIR -name "*.java" | xargs javac -cp "$CODE_CLASSES_DIR:lib/*" -d $TEST_CLASSES_DIR

      # Run JUnit tests
      - name: Run JUnit Tests
        run: |
          java -jar junit-console.jar \
            --class-path "$CODE_CLASSES_DIR:$TEST_CLASSES_DIR:lib/*" \
            --scan-class-path \
            --reports-dir $TEST_REPORT_DIR \
            --include-classname .*Test \
            --details tree \
            | tee $TEST_REPORT_DIR/junit-report.txt
          
      - name: Print junit.txt file
        run: cat $TEST_REPORT_DIR/junit-report.txt

      # Run PMD
      - name: Run PMD
        run: |
          ./pmd/bin/pmd check \
            -d $ASSIGNMENT_DIR \
            -R category/java/bestpractices.xml \
            -f xml \
            -r $TEST_REPORT_DIR/pmd.xml || true

      # Run Checkstyle
      - name: Run Checkstyle
        run: |
          java -jar checkstyle.jar \
            -c /google_checks.xml \
            -f xml \
            -o $TEST_REPORT_DIR/checkstyle.xml \
            $ASSIGNMENT_DIR || true

      # Cache the venv
      - name: Cache venv
        uses: actions/cache@v3
        id: cache-venv
        with:
          path: ${{ env.VENV_PATH }}
          key:  ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}

      # Install venv if not cached
      - name: Create and install venv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv $VENV_PATH

      - name: Check if venv is executable
        run: |    
          if [ ! -x "$VENV_PATH/bin/python" ]; then
            echo "Virtual environment is missing or broken. Recreating..."
            rm -rf $VENV_PATH
            python -m venv $VENV_PATH
            $VENV_PATH/bin/pip install --upgrade pip
            $VENV_PATH/bin/pip install -r requirements.txt
          else
            echo "Virtual environment is executable."
          fi

      - name: Ensure venv packages
        run: |
          $VENV_PATH/bin/pip install --upgrade pip
          $VENV_PATH/bin/pip install -r requirements.txt

      # Run grading script
      - name: Run grading script
        id: grader
        run: |
          if [ -f CodeInspector/main.py ] && [ -f $VENV_PATH/bin/activate ]; then
            source $VENV_PATH/bin/activate
            python CodeInspector/main.py
          else
            echo "CodeInspector/main.py or venv not found, skipping grading"
          fi

      # Upload reports
      - name: Upload grading feedback
        uses: actions/upload-artifact@v4
        with:
          name: grading-feedback
          path: ${{ env.GRADE_REPORT_DIR }}

      # Send feedback email
      - name: Send Feedback Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python <<'EOF'
          import os
          import re
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path
          import json

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']

          json_path = Path(os.environ['TEMP_JSON'])
          with open(json_path, "r") as file:
              data = json.load(file)

              student_email = data.get("student_email", "essa.imhmed@enmu.edu")
              feedback_path = Path(data.get("report_file_path"))

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = gmail_user
          msg['To'] = student_email
          msg.set_content("Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed")

          if feedback_path.exists():
              with open(feedback_path,'rb') as f:
                  msg.add_attachment(f.read(), maintype='text', subtype='plain', filename='feedback.md')

          with smtplib.SMTP('smtp.gmail.com',587) as server:
              server.starttls()
              server.login(gmail_user,gmail_pass)
              server.send_message(msg)

          print("Email sent.")
          EOF