name: Java AutoGrader CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest # "ubuntu-slim" isn't a standard GitHub runner; use latest for best compatibility

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java & Python
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven' # Built-in caching if you use Maven/Gradle later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # CACHE TOOLS: This saves ~30-60 seconds per run
      - name: Cache External Tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            lib/
            pmd/
            checkstyle.jar
            junit-console.jar
          key: ${{ runner.os }}-tools-v1

      - name: Install Utilities & Download Tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p lib build reports/junit
          
          # Download everything in one parallel-friendly block
          wget -O lib/junit-4.13.2.jar https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar &
          wget -O lib/hamcrest-core-1.3.jar https://search.maven.org/remotecontent?filepath=org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar &
          wget -O junit-console.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar &
          wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip &
          wget -O checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar &
          wait
          
          unzip pmd-dist-7.0.0-bin.zip && mv pmd-bin-7.0.0 pmd
          rm pmd-dist-7.0.0-bin.zip

      - name: Compile and Test
        run: |
          mkdir -p build reports/junit
          find upload_here -name "*.java" | xargs javac -d build
          find test -name "*.java" | xargs javac -cp "build:lib/*" -d build
          java -jar junit-console.jar --class-path "build:lib/*" --scan-class-path --reports-dir reports/junit

      - name: Run Static Analysis (PMD & Checkstyle)
        run: |
          ./pmd/bin/pmd check -d upload_here -R category/java/bestpractices.xml -f xml -r reports/pmd.xml || true
          java -jar checkstyle.jar -c /google_checks.xml -f xml -o reports/checkstyle.xml upload_here || true

      - name: Run grading and Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          [ -f grade.py ] && python grade.py || echo "grade.py missing"
          python <<'EOF'
          import os
          import re
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']

          java_files = Path('upload_here').glob('*.java')
          student_email = None

          for java_file in java_files:
              with open(java_file, 'r') as f:
                  content = f.read()

              match = re.search(r'@author\s+([^\s]+)', content)

              if match:
                  username = match.group(1)
                  student_email = f"{username}@enmu.edu"
                  break

          if not student_email:
              student_email = "essa.imhmed@enmu.edu"

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = gmail_user
          msg['To'] = student_email

          msg.set_content(
              "Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed"
          )

          feedback = Path("reports/feedback.md")

          if feedback.exists():
              with open(feedback,'rb') as f:
                  msg.add_attachment(
                      f.read(),
                      maintype='text',
                      subtype='plain',
                      filename='feedback.md'
                  )

          with smtplib.SMTP('smtp.gmail.com',587) as server:
              server.starttls()
              server.login(gmail_user,gmail_pass)
              server.send_message(msg)

          print("Email sent.")
          EOF

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: grading-feedback
          path: reports/
          retention-days: 5 # Saves storage space by deleting old reports sooner
