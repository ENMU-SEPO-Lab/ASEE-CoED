name: Java AutoGrader CI

# Trigger on pushes to upload_here or manual runs
on:
  push:
    branches: [ main ]
    paths:
      - 'upload_here/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java 11
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Setup Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install utilities
      - name: Install wget unzip
        run: sudo apt-get update && sudo apt-get install -y wget unzip

      # Prepare folders
      - name: Prepare folders
        run: |
          mkdir -p lib build reports/junit pmd

      # Cache JUnit & Hamcrest
      - name: Cache JUnit & Hamcrest
        uses: actions/cache@v3
        with:
          path: lib
          key: ${{ runner.os }}-junit-hamcrest

      # Download JUnit & Hamcrest if missing
      - name: Download JUnit & Hamcrest
        run: |
          [ -f lib/junit-4.13.2.jar ] || wget -O lib/junit-4.13.2.jar https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar
          [ -f lib/hamcrest-core-1.3.jar ] || wget -O lib/hamcrest-core-1.3.jar https://search.maven.org/remotecontent?filepath=org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

      # Cache JUnit Console Runner
      - name: Cache JUnit Console
        uses: actions/cache@v3
        with:
          path: junit-console.jar
          key: ${{ runner.os }}-junit-console

      # Download JUnit Console Runner if missing
      - name: Download JUnit Console
        run: |
          [ -f junit-console.jar ] || wget -O junit-console.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar

      # Compile student code
      - name: Compile Student Code
        run: |
          find upload_here -name "*.java" | xargs javac -d build

      # Compile tests
      - name: Compile Tests
        run: |
          find test -name "*.java" | xargs javac -cp "build:lib/*" -d build

      # Run JUnit tests and generate XML reports
      - name: Run JUnit Tests
        run: |
          java -jar junit-console.jar \
            --class-path "build:lib/*" \
            --scan-class-path \
            --reports-dir reports/junit \
            --include-classname .*Test

      # Cache PMD
      - name: Cache PMD
        uses: actions/cache@v3
        with:
          path: pmd
          key: ${{ runner.os }}-pmd

      # Download PMD if missing
      - name: Download PMD
        run: |
          [ -f pmd/bin/run.sh ] || (
            wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip
            unzip pmd-dist-7.0.0-bin.zip
            mv pmd-bin-7.0.0 pmd
          )

      # Run PMD
      - name: Run PMD
        run: |
          mkdir -p reports
          ./pmd/bin/run.sh pmd check \
            -d upload_here \
            -R category/java/bestpractices.xml \
            -f xml \
            -r reports/pmd.xml || true

      # Cache Checkstyle
      - name: Cache Checkstyle
        uses: actions/cache@v3
        with:
          path: checkstyle.jar
          key: ${{ runner.os }}-checkstyle

      # Download Checkstyle if missing
      - name: Download Checkstyle
        run: |
          [ -f checkstyle.jar ] || wget -O checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

      # Run Checkstyle
      - name: Run Checkstyle
        run: |
          java -jar checkstyle.jar \
            -c /google_checks.xml \
            -f xml \
            -o reports/checkstyle.xml \
            upload_here || true

      # Run grading script
      - name: Run grading script
        run: |
          if [ -f grade.py ]; then
            python grade.py
          else
            echo "grade.py not found, skipping grading"
          fi

      # Upload reports
      - name: Upload grading feedback
        uses: actions/upload-artifact@v4
        with:
          name: grading-feedback
          path: reports/

      # Send Feedback Email
      - name: Send Feedback Email
        if: always()
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python <<'EOF'
          import os
          import re
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']

          java_files = Path('upload_here').glob('*.java')
          student_email = None

          for java_file in java_files:
              with open(java_file, 'r') as f:
                  content = f.read()
              match = re.search(r'@author\s+([^\s]+)', content)
              if match:
                  username = match.group(1)
                  student_email = f"{username}@enmu.edu"
                  break

          if not student_email:
              student_email = "essa.imhmed@enmu.edu"

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback'
          msg['From'] = gmail_user
          msg['To'] = student_email
          msg.set_content("Hello,\n\nYour automated grading feedback is attached.\n\nRegards,\nDr. Imhmed")

          feedback = Path("reports/feedback.md")
          if feedback.exists():
              with open(feedback,'rb') as f:
                  msg.add_attachment(f.read(), maintype='text', subtype='plain', filename='feedback.md')

          with smtplib.SMTP('smtp.gmail.com',587) as server:
              server.starttls()
              server.login(gmail_user,gmail_pass)
              server.send_message(msg)

          print("Email sent.")
          EOF